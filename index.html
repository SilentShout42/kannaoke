<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kannaoke — Kanna Yanagi Karaoke Index</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Kannaoke</h1>
    <p class="subtitle">Kanna Yanagi Karaoke Index</p>
  </header>

  <div class="search-bar">
    <input
      type="search"
      id="search"
      placeholder="Search songs or artists..."
      autocomplete="off"
      spellcheck="false"
    />
    <span class="result-count" id="result-count"></span>
  </div>

  <main>
    <section class="results-panel">
      <ul id="results" role="list"></ul>
    </section>

    <aside class="player-panel" id="player-panel">
      <div class="now-playing" id="now-playing" hidden>
        <span class="now-playing-label">Now playing</span>
        <span class="now-playing-title" id="now-playing-title"></span>
        <span class="now-playing-artist" id="now-playing-artist"></span>
        <span class="now-playing-stream" id="now-playing-stream"></span>
      </div>
      <div class="yt-container" id="yt-container" hidden>
        <div id="yt-player"></div>
      </div>
      <p class="player-placeholder" id="player-placeholder">
        Select a song to start playing
      </p>
    </aside>
  </main>

  <footer>
    <p>Fan-made index. Not affiliated with Kanna Yanagi or any agency.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="app.js"></script>
</body>
</html>
